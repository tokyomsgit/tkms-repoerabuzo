<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>レポ選ぶぞう</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --repo-pane-color:#ffe066;
  --koma-pane-color:#7ec8e8;
  --mobile-font-scale:1;
}
html.mobile-fs-s{--mobile-font-scale:1.15}
html.mobile-fs-m{--mobile-font-scale:1.31}
html.mobile-fs-l{--mobile-font-scale:1.50}
body{
  font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
  font-weight:700;
  background:#ececec;
  color:#111;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.container{
  width:100%;
  max-width:960px;
  margin:0 auto;
  padding:0 16px;
}
.site-header{
  width:100%;
  background:#fff;
  border-bottom:3px solid #111;
  flex-shrink:0;
}
.site-toolbar{
  width:100%;
  background:#f5f5f5;
  flex-shrink:0;
}
.site-toolbar .container{
  border-bottom:3px solid #111;
}
.site-main{
  width:100%;
  background:#ececec;
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  padding-bottom:16px;
}
.site-main > .container.main-layout{
  flex:1;
  min-height:0;
  background:#fff;
  border:3px solid #111;
  border-top:none;
  padding:0;
  max-width:960px;
}

/* ヘッダー */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;
}
.logo{font-size:22px;font-weight:900;letter-spacing:.05em;color:#111}
.header-left{display:flex;align-items:center;gap:18px;flex-wrap:wrap;min-width:0}
.header-meta{display:flex;flex-direction:column;gap:2px;font-weight:700;line-height:1.4}
#import-time-label{font-size:13px;color:#333}
.settings-sync-note{font-size:13px;color:#666;line-height:1.5}
.hdr-menu-wrap{position:relative;flex-shrink:0}
.hdr-menu-btn{
  display:none;
  align-items:center;justify-content:center;
  width:40px;height:36px;
  border:2px solid #111;background:#f5f5f5;
  font-family:inherit;font-size:20px;font-weight:900;
  cursor:pointer;line-height:1;
}
.hdr-menu{
  display:flex;gap:10px;align-items:center;
}
.hdr-btn{
  padding:8px 14px;
  background:#e8e8e8;color:#333;
  border:1px solid #ccc;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:13px;
  letter-spacing:.02em;
}
.hdr-btn:hover{background:#ddd}
.hdr-btn:disabled{background:#f0f0f0;color:#999;cursor:not-allowed;border-color:#ddd}
.btn-label-short{display:none}

/* スマホ：レポ／コマ切替タブ */
.mobile-pane-tabs{display:none}

.other-count-progress{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:10px 18px;border-radius:8px;
  font-size:13px;font-weight:700;z-index:9000;min-width:240px;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
}
.other-count-progress-bar{
  margin-top:8px;height:6px;background:#444;border-radius:3px;overflow:hidden;
}
.other-count-progress-fill{
  height:100%;background:#4caf50;width:0%;transition:width .2s;
}

/* メインレイアウト */
.main-layout{
  display:grid;
  grid-template-columns:1fr 4px 1fr;
  flex:1;
  min-height:0;
}
.divider{background:#111}

/* 各ペイン */
.pane{display:flex;flex-direction:column;overflow:hidden}

.pane-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;
  border-bottom:2px solid #111;
  flex-shrink:0;
  width:100%;
}
.pane-title{font-size:18px;font-weight:900}
.pane-title-bar{display:flex;gap:8px;align-items:center}
.pane-count{font-size:13px;color:#555;font-weight:700}

/* 掲載枠バッジ */
.quota-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:13px;font-weight:900;
  padding:2px 4px;color:#333;
}
.quota-badge .quota-current{font-size:32px;font-weight:900;line-height:1}
.quota-badge .quota-limit{font-size:20px;color:#666}
.quota-badge .quota-diff{font-size:20px;font-weight:900;margin-left:2px}
.quota-diff.over{color:#cc0000}
.quota-diff.under{color:#0055cc}
.quota-diff.ok{color:#007700}

.pane-left{background:#fff}
.pane-right{background:#fff}
.pane-left .pane-header{background:var(--repo-pane-color)}
.pane-right .pane-header{background:var(--koma-pane-color)}

.text-output-btn{
  padding:4px 14px;
  background:#111;color:#fff;
  border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:13px;
}
.text-output-btn:hover{background:#333}
.pane-header-btns{display:flex;gap:6px;flex-shrink:0}
.removal-output-btn{
  padding:4px 12px;
  background:#fff;color:#cc0000;
  border:2px solid #cc0000;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:13px;
}
.removal-output-btn:hover{background:#fff0f0}

/* 共通ツールバー */
.shared-toolbar{
  padding:8px 0;
  display:flex;gap:16px;align-items:center;flex-wrap:wrap;
}
.toolbar-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tb-label{font-size:13px;font-weight:900;white-space:nowrap;color:#444}
.area-select{
  padding:5px 10px;border:2px solid #111;
  background:#fff;font-family:inherit;font-weight:700;font-size:14px;
  outline:none;cursor:pointer;flex:1;min-width:80px;
}

/* ソートボタン */
.sort-btn{
  padding:5px 12px;
  border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:3px;
}
.sort-btn.active{background:#111;color:#fff}
.sort-btn:hover:not(.active){background:#eee}
.sort-dir{font-size:11px}

/* テンプレ */
.tmpl-select{
  padding:5px 10px;border:2px solid #111;
  background:#fff;font-family:inherit;font-weight:700;font-size:13px;
  outline:none;cursor:pointer;
}
.tmpl-input{
  padding:5px 10px;border:2px solid #111;
  font-family:inherit;font-weight:700;font-size:13px;
  outline:none;width:120px;
}
.tmpl-btn{
  padding:5px 12px;
  border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
}
.tmpl-btn:hover{background:#eee}
.tmpl-btn.save{background:#FFD700;border-color:#cc9900}
.tmpl-btn.save:hover{background:#e6c000}
.tmpl-btn.del{color:#cc0000;border-color:#cc0000}
.tmpl-btn.del:hover{background:#fff0f0}

/* 設定モーダル */
.settings-section{
  margin-bottom:20px;padding-bottom:16px;
  border-bottom:2px solid #eee;
}
.settings-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.settings-section-title{
  font-size:14px;font-weight:900;color:#444;margin-bottom:10px;
}
.settings-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mobile-fs-options{display:flex;gap:10px;flex-wrap:wrap}
.mobile-fs-option{
  display:flex;align-items:center;gap:6px;
  font-size:15px;font-weight:700;cursor:pointer;
  padding:8px 14px;border:2px solid #ccc;border-radius:6px;
  background:#fafafa;
}
.mobile-fs-option:has(input:checked){
  border-color:#111;background:#111;color:#fff;
}
.mobile-fs-option input{
  width:16px;height:16px;accent-color:#111;cursor:pointer;
}

/* カードリスト */
.card-list{
  flex:1;overflow-y:auto;
  padding:6px 8px;
  display:flex;flex-direction:column;gap:4px;
  width:100%;
}
.card-list::-webkit-scrollbar{width:4px}
.card-list::-webkit-scrollbar-thumb{background:#ccc}

/* 物件カード */
.prop-card{
  display:flex;align-items:center;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  user-select:none;
  background:#fff;
  border:1px solid #111;
  transition:transform .1s, box-shadow .1s;
  gap:6px;
}
.prop-card:hover .card-arrow{
  background:#111;color:#fff;border-color:#111;
}
.prop-card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
.prop-card:active{transform:translateY(0)}
.prop-card.prop-moved{
  border:3px solid #cc0000;
  background:#fff0f0;
}

.card-inner{flex:1;min-width:0}
.card-top-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;min-width:0;margin-bottom:2px;
}
.card-name{
  font-size:18px;font-weight:900;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:#111;
  flex:1;min-width:0;
}
.card-stats{
  display:flex;align-items:center;gap:6px 8px;
  flex-shrink:0;white-space:nowrap;
}
.card-rep{
  font-size:16px;font-weight:900;
  color:#cc9900;
  white-space:nowrap;
}
.card-other{
  font-size:16px;font-weight:900;
  color:#cc0000;
  white-space:nowrap;
}
.card-other-missing{color:#777}
.card-pv{color:#111;font-weight:900}
.card-muted{color:#777;font-weight:400}
.card-name-link{
  color:#111;
  text-decoration:underline;
}
.card-name-link:hover{color:#333}
.card-meta{
  display:flex;gap:8px 10px;flex-wrap:wrap;
  font-size:16px;font-weight:700;color:#333;
  line-height:1.3;
}
.card-meta span{white-space:nowrap}
.card-arrow{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;
  font-size:20px;font-weight:900;
  color:#111;background:#f0f0f0;
  border:2px solid #111;border-radius:10px;
  line-height:1;
  transition:background .15s,color .15s,border-color .15s;
}

.empty-state{
  display:flex;align-items:center;justify-content:center;
  flex:1;font-size:14px;color:#aaa;font-weight:700;
}

/* ドラッグ＆ドロップ */
.prop-card[draggable="true"]{cursor:grab}
.prop-card[draggable="true"]:active{cursor:grabbing}
.prop-card.dragging{opacity:.35;transform:scale(.97)}
.card-list.drag-over{
  background:rgba(0,0,0,.06);
  outline:3px dashed #111;
  outline-offset:-4px;
}
.drop-placeholder{
  height:52px;border-radius:8px;border:3px dashed #999;
  background:rgba(0,0,0,.04);flex-shrink:0;
}

/* テキスト出力モーダル */
.text-modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:1000;
  align-items:center;justify-content:center;
}
.text-modal-overlay.open{display:flex}
.text-modal{
  background:#fff;border:3px solid #111;
  width:520px;max-width:95vw;max-height:80vh;
  display:flex;flex-direction:column;
}
.text-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:2px solid #111;flex-shrink:0;
}
.text-modal-title{font-size:16px;font-weight:900}
.text-modal-close{background:none;border:none;font-size:24px;cursor:pointer;font-weight:900;line-height:1}
.text-modal-body{flex:1;overflow-y:auto;padding:14px 16px}
.text-output-area{
  width:100%;min-height:200px;
  border:2px solid #111;padding:10px;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;
  line-height:1.8;resize:vertical;outline:none;
}
.text-copy-btn{
  display:block;width:100%;margin-top:10px;padding:10px;
  background:#111;color:#fff;border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:14px;
}
.text-copy-btn:hover{background:#333}

.mail-area-row{
  margin-top:10px;padding:10px 12px;
  border:2px solid #111;background:#f5f5f5;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.mail-area-label{font-size:13px;font-weight:900;white-space:nowrap}
.mail-area-options{display:flex;gap:14px;flex-wrap:wrap}
.mail-area-option{
  display:flex;align-items:center;gap:5px;
  font-size:14px;font-weight:700;cursor:pointer;
}
.mail-area-option input{
  width:16px;height:16px;accent-color:#111;cursor:pointer;
}

/* エリア複数選択ドロップダウン */
.area-multi-wrap{position:relative;display:inline-block}
.area-multi-btn{
  padding:5px 12px;border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:14px;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  min-width:120px;white-space:nowrap;
}
.area-multi-btn:hover{background:#eee}
.area-dropdown{
  display:none;position:absolute;top:100%;left:0;
  min-width:180px;background:#fff;border:2px solid #111;
  z-index:500;max-height:300px;overflow-y:auto;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.area-dropdown.open{display:block}
.area-dd-ctrl-row{
  display:flex;gap:4px;padding:6px 8px;
  border-bottom:2px solid #111;background:#f5f5f5;
}
.area-dd-ctrl{
  padding:3px 10px;border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;
}
.area-dd-ctrl:hover{background:#eee}
.area-dd-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;cursor:pointer;border-bottom:1px solid #eee;
}
.area-dd-item:hover{background:#f5f5f5}
.area-dd-item input[type=checkbox]{
  width:15px;height:15px;cursor:pointer;accent-color:#111;flex-shrink:0;
}
.area-dd-item label{
  font-size:14px;font-weight:700;cursor:pointer;flex:1;
}
/* 途中保存バッジ */
.draft-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 8px 4px 12px;
  border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
}
.draft-badge:hover{background:#f0f0f0}
.draft-badge.active{background:#111;color:#fff}
.draft-del{
  background:none;border:none;font-size:16px;font-weight:900;
  cursor:pointer;line-height:1;padding:0;color:#cc0000;
}
.draft-badge.active .draft-del{color:#ff9999}

#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:10px 20px;font-size:14px;font-weight:700;
  z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;
}

/* ============================================================
   レスポンシブ（タブレット・スマホ 768px以下）
============================================================ */
@media (max-width:768px){
  .container{padding:0 10px}
  body{background:#fff;min-height:100dvh}
  .site-main{background:#fff;padding-bottom:0;min-height:0;flex:1}
  .site-main > .container.main-layout{
    border:none;padding:0;max-width:none;flex:1;min-height:0;display:flex;flex-direction:column;
  }
  .site-toolbar .container{border-bottom:none;overflow:visible}
  .shared-toolbar{padding:8px 0;gap:8px;overflow:visible}

  /* ヘッダー */
  .header{
    flex-direction:row;align-items:center;justify-content:space-between;
    padding:6px 0;gap:8px;
  }
  .header-left{
    flex:1;min-width:0;
    flex-direction:row;align-items:center;justify-content:space-between;
    gap:8px;
  }
  .header-meta{text-align:right;flex-shrink:1;min-width:0}
  .logo{font-size:17px;flex-shrink:0}
  #import-time-label{font-size:11px;white-space:nowrap}
  .hdr-menu-btn{display:flex}
  .hdr-menu{
    display:none;position:absolute;top:calc(100% + 4px);right:0;
    min-width:168px;background:#fff;
    border:2px solid #111;box-shadow:0 4px 12px rgba(0,0,0,.12);
    z-index:300;flex-direction:column;gap:0;
  }
  .hdr-menu.open{display:flex}
  .hdr-menu .hdr-btn{
    width:100%;border:none;border-bottom:1px solid #ddd;border-radius:0;
    text-align:left;padding:11px 14px;font-size:14px;line-height:1.3;
  }
  .hdr-menu .hdr-btn:last-child{border-bottom:none}
  .btn-label-long{display:none}
  .btn-label-short{display:inline}

  /* ツールバー */
  .toolbar-row-area{width:100%}
  .toolbar-row-area .area-multi-wrap{display:block;width:100%}
  .toolbar-row-area .area-multi-btn{width:100%;justify-content:space-between;min-height:40px}
  .toolbar-row-scroll{flex-wrap:nowrap;overflow-x:auto;gap:6px;-webkit-overflow-scrolling:touch}
  .toolbar-row-scroll::-webkit-scrollbar{height:0}
  .tb-label{font-size:calc(12px * var(--mobile-font-scale));flex-shrink:0}
  .area-multi-btn{font-size:calc(13px * var(--mobile-font-scale));min-width:100px;padding:8px 10px;min-height:40px}
  .sort-btn{font-size:calc(12px * var(--mobile-font-scale));padding:8px 10px;flex-shrink:0;min-height:40px}

  /* レポ／コマタブ */
  .mobile-pane-tabs{
    display:flex;width:100%;
    background:#fff;border-bottom:3px solid #111;
    position:sticky;top:0;z-index:200;
  }
  .mobile-pane-tab{
    flex:1;padding:12px 8px;
    border:none;border-right:2px solid #111;
    background:#f5f5f5;
    font-family:inherit;font-weight:900;font-size:calc(16px * var(--mobile-font-scale));
    cursor:pointer;min-height:48px;
  }
  .mobile-pane-tab:last-child{border-right:none}
  .mobile-pane-tab.active{background:#111;color:#fff}

  /* 1画面1ペイン */
  .main-layout{
    display:flex;flex-direction:column;
    flex:1;min-height:0;
  }
  .divider{display:none}
  .pane{display:none;flex:1;min-height:0;height:auto}
  .pane.mobile-active{display:flex}

  /* ペインヘッダー */
  .pane-header{
    padding:5px 10px;flex-wrap:wrap;gap:4px;
  }
  .pane-title{font-size:calc(15px * var(--mobile-font-scale))}
  .pane-header-btns{width:100%}
  .text-output-btn,.removal-output-btn{
    width:100%;font-size:calc(13px * var(--mobile-font-scale));padding:10px;min-height:44px;
  }
  .quota-badge .quota-current{font-size:calc(22px * var(--mobile-font-scale))}
  .quota-badge .quota-limit{font-size:calc(13px * var(--mobile-font-scale))}
  .quota-badge .quota-diff{font-size:calc(13px * var(--mobile-font-scale))}

  /* カード */
  .card-list{padding:4px 4px;flex:1}
  .prop-card{padding:4px 5px;gap:5px}
  .card-top-row{margin-bottom:2px;gap:6px}
  .card-name{font-size:calc(15px * var(--mobile-font-scale))}
  .card-stats{gap:4px 6px}
  .card-rep,.card-other,.card-pv{font-size:calc(13px * var(--mobile-font-scale))}
  .card-meta{font-size:calc(12px * var(--mobile-font-scale));gap:4px 8px;line-height:1.25}
  .card-arrow{
    width:calc(40px * var(--mobile-font-scale));height:calc(40px * var(--mobile-font-scale));
    font-size:calc(18px * var(--mobile-font-scale));border-radius:8px;
  }

  /* エリアドロップダウン */
  .area-dropdown{
    position:fixed;left:10px;right:10px;width:auto;max-height:50vh;overflow-y:auto;
    z-index:800;
  }

  /* モーダル */
  .text-modal{width:96vw;max-height:85vh}
  #toast{
    bottom:max(16px, env(safe-area-inset-bottom));
    left:10px;right:10px;transform:none;text-align:center;
  }
  .other-count-progress{
    bottom:max(16px, env(safe-area-inset-bottom));
    left:10px;right:10px;transform:none;
  }
}
</style>
</head>
<body>

<div class="site-header">
  <div class="container header">
    <div class="header-left">
      <div class="logo">レポ選ぶぞう</div>
      <div class="header-meta">
        <span id="import-time-label">取込：—</span>
      </div>
    </div>
    <div class="hdr-menu-wrap" id="hdr-menu-wrap">
      <button type="button" class="hdr-menu-btn" id="hdr-menu-btn" onclick="toggleHdrMenu(event)" aria-label="メニュー">☰</button>
      <div class="hdr-menu" id="hdr-menu">
        <button class="hdr-btn" id="other-count-btn" onclick="menuOtherCount()"><span class="btn-label-long">他社件数を更新</span><span class="btn-label-short">他社更新</span></button>
        <button class="hdr-btn gas-sync-btn" onclick="menuGasSync()"><span class="btn-label-long">Drive同期</span><span class="btn-label-short">Drive</span></button>
        <button class="hdr-btn" onclick="menuSettings()">⚙ 設定</button>
      </div>
    </div>
  </div>

   途中保存（localStorage）
============================================================ */
let drafts = {};
let currentDraftName = null;
const DRAFT_KEY = 'repoSelectApp_drafts';

async function loadDrafts() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    drafts = raw ? JSON.parse(raw) : {};
  } catch { drafts = {}; }
  renderDraftList();
}

function saveDraftsToLocal() {
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts)); } catch {}
}

function renderDraftList() {
  const el = document.getElementById('draft-list');
  if (!el) return;
  el.innerHTML = '';
  Object.keys(drafts).sort().forEach(name => {
    const badge = document.createElement('button');
    badge.className = 'draft-badge' + (name === currentDraftName ? ' active' : '');
    badge.innerHTML = `<span onclick="loadDraft('${esc(name)}')">${name}</span><button class="draft-del" onclick="deleteDraft(event,'${esc(name)}')">×</button>`;
    el.appendChild(badge);
  });
}

async function saveDraft() {
  const input = document.getElementById('draft-name-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  drafts[name] = {
    movedToKoma: [...movedToKoma],
    movedToRepo: [...movedToRepo],
    areas: [...selectedAreas],
  };
  saveDraftsToLocal();
  currentDraftName = name;
  input.value = '';
  renderDraftList();
  showToast(`「${name}」を保存しました`);
}

function loadDraft(name) {
  const d = drafts[name];
  if (!d) return;
  movedToKoma = new Set(d.movedToKoma || []);
  movedToRepo = new Set(d.movedToRepo || []);
  selectedAreas = new Set(d.areas || []);
  document.querySelectorAll('#area-dd-list input[type=checkbox]').forEach(cb => {
    cb.checked = selectedAreas.size === 0 || selectedAreas.has(cb.value);
  });
  updateAreaLabel();
  currentDraftName = name;
  renderDraftList();
  renderCards();
  showToast(`「${name}」を復元しました`);
}

async function deleteDraft(e, name) {
  e.stopPropagation();
  delete drafts[name];
  saveDraftsToLocal();
  if (currentDraftName === name) currentDraftName = null;
  renderDraftList();
  showToast(`「${name}」を削除しました`);
}

async function loadFromStorage() {
  try {
    const { data: rows, error } = await sb
      .from(SB_IMPORTS).select('prop_data, imported_at, imported_by')
      .order('imported_at', { ascending: false }).limit(1);
    if (error || !rows || rows.length === 0) {
      updateImportMetaDisplay(null);
      return false;
    }
    applyLatestImport(rows[0]);
    return true;
  } catch(e) { console.error(e); return false; }
}

async function checkForAutoSync() {
  try {
    const { data: rows, error } = await sb
      .from(SB_IMPORTS).select('prop_data, imported_at, imported_by')
      .order('imported_at', { ascending: false }).limit(1);
    if (error || !rows?.length) return;
    if (lastImportAt && rows[0].imported_at !== lastImportAt) {
      applyLatestImport(rows[0], true);
      buildAreaSelects();
      renderCards();
      const src = rows[0].imported_by === 'Drive自動取込' ? 'Drive自動取込' : 'データ更新';
      showToast('最新データを反映しました（' + src + '）', 4000);
    }
  } catch (e) { console.error(e); }
}

function startAutoSyncPoll() {
  setInterval(checkForAutoSync, AUTO_SYNC_MS);
}

function parseProps(propData, silent) {
  repoProps = [];
  komaProps = [];
  Object.entries(propData).forEach(([area, props]) => {
    props.forEach(p => {
      const item = { ...p, _area: area };
      if (p._type === 'repo') repoProps.push(item);
      else if (p._type === 'koma') komaProps.push(item);
      else {
        // _typeが不明な場合はコマ扱い（旧データ互換）
        item._type = 'koma';
        komaProps.push(item);
      }
    });
  });
  if (!silent) showToast(`読込完了：レポ ${repoProps.length}件 / コマ ${komaProps.length}件`);
  checkSetagayaWarning(propData);
}

/* ============================================================
   ソート（レポ・コマ共通）
============================================================ */
function setSort(key) {
  if (sortState.key === key) {
    sortState.dir = sortState.dir === 'desc' ? 'asc' : 'desc';
  } else {
    sortState.key = key;
    sortState.dir = key === 'area' ? 'asc' : 'desc';
  }
  updateSortUI();
  renderCards();
}

function updateSortUI() {
  const keys = ['pv','r','other','p','s','area'];
  keys.forEach(k => {
    const btn = document.getElementById(`sort-${k}`);
    const dir = document.getElementById(`dir-${k}`);
    if (!btn || !dir) return;
    const isActive = sortState.key === k;
    btn.classList.toggle('active', isActive);
    if (isActive) dir.textContent = sortState.dir === 'desc' ? '↓' : '↑';
    else dir.textContent = k === 'area' ? '↑' : '↓';
  });
}

function sortProps(arr) {
  const { key, dir } = sortState;
  const d = dir === 'desc' ? -1 : 1;
  return [...arr].sort((a, b) => {
    if (key === 'area') {
      const aa = displayAreaName(a._area);
      const bb = displayAreaName(b._area);
      return (aa < bb ? -1 : aa > bb ? 1 : 0) * d;
    }
    if (key === 'other') {
      const av = getOtherCountForProp(a);
      const bv = getOtherCountForProp(b);
      const aVal = av === null ? -1 : av;
      const bVal = bv === null ? -1 : bv;
      return (bVal - aVal) * d;
    }
    return ((b[key] || 0) - (a[key] || 0)) * d;
  });
}

async function loadTemplates() {
  try {
    const { data } = await sb.from(SB_TEMPLATES).select('name,areas');
    if (!data) return;
    templates = { repo: {}, koma: {}, shared: {} };
    data.forEach(row => {
      if (row.name.startsWith('repoApp_shared::')) {
        templates.shared[row.name.slice('repoApp_shared::'.length)] = row.areas;
      } else if (row.name.startsWith('repoApp_repo::')) {
        templates.repo[row.name.slice('repoApp_repo::'.length)] = row.areas;
      } else if (row.name.startsWith('repoApp_koma::')) {
        templates.koma[row.name.slice('repoApp_koma::'.length)] = row.areas;
      }
    });
    buildTmplSelects();
  } catch(e) { console.error('loadTemplates:', e); }
}

function buildTmplSelects() {
  const all = { ...templates.repo, ...templates.koma, ...templates.shared };
  const sel = document.getElementById('shared-tmpl-select');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択…</option>';
  Object.keys(all).sort().forEach(name => {
    sel.innerHTML += `<option value="${esc(name)}">${name}</option>`;
  });
  sel.value = cur;
}

function loadTemplate() {
  const sel = document.getElementById('shared-tmpl-select');
  const name = sel.value;
  if (!name) return;
  const all = { ...templates.repo, ...templates.koma, ...templates.shared };
  const saved = all[name]; // 配列 or 文字列
  if (saved !== undefined) {
    // 配列ならSet、文字列なら1要素Set、空文字なら全エリア
    const areaArr = Array.isArray(saved) ? saved : (saved ? [saved] : []);
    selectedAreas = new Set(areaArr);
    // チェックボックスを更新
    document.querySelectorAll('#area-dd-list input[type=checkbox]').forEach(cb => {
      cb.checked = selectedAreas.size === 0 || selectedAreas.has(cb.value);
    });

async function saveTemplate() {
  const nameInput = document.getElementById('shared-tmpl-name');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  // 選択中のエリアを配列で保存（空=全エリア）
  const areaArr = selectedAreas.size === 0 ? [] : [...selectedAreas];
  const dbKey = `repoApp_shared::${name}`;
  const { error } = await sb.from(SB_TEMPLATES).upsert(
    { name: dbKey, areas: areaArr }, { onConflict: 'name' }
  );
  if (error) { showToast('保存失敗: ' + error.message); return; }
  templates.shared[name] = areaArr;
  buildTmplSelects();
  document.getElementById('shared-tmpl-select').value = name;
  nameInput.value = '';
  const label = areaArr.length === 0 ? '全エリア' : areaArr.join('・');
  showToast(`「${name}」を保存しました（${label}）`);
}

async function deleteTemplate() {
  const sel = document.getElementById('shared-tmpl-select');
  const name = sel.value;
  if (!name) return;
  let dbKey = null;
  if (templates.shared[name] !== undefined) dbKey = `repoApp_shared::${name}`;
  else if (templates.repo[name]  !== undefined) dbKey = `repoApp_repo::${name}`;
  else if (templates.koma[name]  !== undefined) dbKey = `repoApp_koma::${name}`;
  if (dbKey) await sb.from(SB_TEMPLATES).delete().eq('name', dbKey);
  delete templates.shared[name]; delete templates.repo[name]; delete templates.koma[name];
  buildTmplSelects();
  showToast(`「${name}」を削除しました`);
}

}

/* 掲載枠バッジ更新 */
function updateQuotaBadge(pane, current, areas) {
  document.getElementById(`${pane}-count`).textContent = current + '件';

  const limitEl = document.getElementById(`${pane}-limit`);
  const diffEl  = document.getElementById(`${pane}-diff`);
  const badge   = document.getElementById(`${pane}-quota-badge`);

  // 単一エリア選択時のみ枠数表示
  const singleArea = areas.size === 1 ? [...areas][0] : null;

  // 世田谷区（数字なし）エラー
  if (singleArea && isSetagayaError(singleArea)) {
    limitEl.textContent = '';
    diffEl.textContent  = '⚠ 世田谷区1 or 2 が必要です';
    diffEl.className    = 'quota-diff over';
    return;
  }

  let limit;
  if (areas.size === 0) {
    limit = QUOTA_TOTAL[pane];
  } else if (singleArea) {
    limit = QUOTA[singleArea] ? QUOTA[singleArea][pane] : null;
  } else {
    let sum = 0;
    [...areas].forEach(a => {
      if (QUOTA[a]) sum += QUOTA[a][pane];
    });
    limit = sum > 0 ? sum : null;
  }

  if (limit == null) {
    limitEl.textContent = '';
    diffEl.textContent  = '枠未設定';
    diffEl.className    = 'quota-diff over';
    return;
  }

  limitEl.textContent = '/ ' + limit + '件';
  const diff = current - limit;

  if (diff > 0) {
    diffEl.textContent = '+' + diff;
    diffEl.className   = 'quota-diff over';
  } else if (diff < 0) {
    diffEl.textContent = String(diff);
    diffEl.className   = 'quota-diff under';
  } else {
    diffEl.textContent = '✓';
    diffEl.className   = 'quota-diff ok';
  }
}

function renderList(containerId, props, pane) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';

  if (props.length === 0) {
    el.innerHTML = '<div class="empty-state">物件がありません</div>';
  } else {
    props.forEach(p => {
      const isMoved = (pane === 'repo' && movedToRepo.has(p.n)) ||
                      (pane === 'koma' && movedToKoma.has(p.n));
      const arrow = pane === 'repo' ? '→' : '←';
      const price = p.p ? p.p.toLocaleString() + '万' : '—';
      const areaStr = p.s ? p.s + '㎡' : '—';
      const pv  = p.pv !== undefined ? `<span class="card-pv">PV ${p.pv}</span>` : '';
      const rep = p.r ? `<span class="card-rep">反響 ${p.r}件</span>` : '';
      const parts = splitPropertyName(p.n);
      const buildingName = suumoSearchKeyword(p.n);
      const cacheKey = buildingName + '|' + Math.round(Number(p.p));
      const otherInfo = otherCountCache.get(cacheKey);
      const otherBadge = otherInfo
        ? `<span class="card-other">他社 ${otherInfo.other_count}件</span>`
        : `<span class="card-other card-other-missing">他社未取得</span>`;

      const card = document.createElement('div');
      card.className = 'prop-card' + (isMoved ? ' prop-moved' : '');
      card.draggable = true;
      card.dataset.name = p.n;
      card.dataset.pane = pane;
      const suumoKw = suumoSearchKeyword(p.n);
      const roomLabel = parts.room
        ? `<span class="card-muted">${esc(parts.room)}</span>`
        : '';
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-top-row">
            <a class="card-name card-name-link" href="${suumoSearchUrl(p.n)}" target="_blank" rel="noopener noreferrer" title="SUUMOで「${esc(suumoKw)}」を検索">${esc(parts.building || p.n)}</a>
            <div class="card-stats">
              ${rep}
              ${pv}
              ${otherBadge}
            </div>
          </div>
          <div class="card-meta">
            ${roomLabel}
            <span class="card-muted">${price}</span>
            <span class="card-muted">${areaStr}</span>
            <span class="card-muted">${displayAreaName(p._area)}</span>
          </div>
        </div>
        <div class="card-arrow">${arrow}</div>`;

      // クリックで移動
      card.addEventListener('click', () => moveCardLogic(p.n, pane));

      // ドラッグ開始
      card.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({ name: p.n, fromPane: pane }));
        setTimeout(() => card.classList.add('dragging'), 0);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.card-list').forEach(l => l.classList.remove('drag-over'));
        document.querySelectorAll('.drop-placeholder').forEach(ph => ph.remove());
      });

      // 子要素のpointer-eventsをなくしてドラッグを親カードに集約
      card.querySelectorAll('*').forEach(child => {
        child.style.pointerEvents = 'none';
      });

      const nameLink = card.querySelector('.card-name-link');
      nameLink.style.pointerEvents = 'auto';
      nameLink.addEventListener('click', e => {
        e.stopPropagation();
        e.preventDefault();
        window.open(suumoSearchUrl(p.n), '_blank', 'noopener,noreferrer');
      });
      nameLink.addEventListener('mousedown', e => e.stopPropagation());
      nameLink.addEventListener('dragstart', e => e.preventDefault());

      el.appendChild(card);
    });
  }

  // ドロップゾーン：_ddSetupフラグで重複登録を防ぐ
  if (!el._ddSetup) {
    el._ddSetup = true;
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.classList.add('drag-over');
      if (!el.querySelector('.drop-placeholder')) {
        const ph = document.createElement('div');
        ph.className = 'drop-placeholder';
        el.appendChild(ph);
      }
    });
    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) {
        el.classList.remove('drag-over');
        el.querySelectorAll('.drop-placeholder').forEach(ph => ph.remove());
      }
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      el.querySelectorAll('.drop-placeholder').forEach(ph => ph.remove());
      try {
        const { name, fromPane } = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (fromPane === pane) return;
        moveCardLogic(name, fromPane);
      } catch {}
    });
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function suumoSearchKeyword(name) {
  return splitPropertyName(name).building;
}

function splitPropertyName(name) {
  const n = (name || '').trim();
  const m = n.match(/^(.+?)\s+([\d\-]+号(?:室)?)$/u);
  if (m) return { building: m[1].trim(), room: m[2] };
  const m2 = n.match(/^(.+?)\s+([A-Za-z]?[\d\-]+)$/u);
  if (m2) return { building: m2[1].trim(), room: m2[2] };
  return { building: n, room: '' };
}

function suumoSearchUrl(name) {
  const q = encodeURIComponent(suumoSearchKeyword(name));
  // 検索パネルの入力欄は name="fw2" だが、検索結果URLは fw= になる
  return 'https://suumo.jp/jj/bukken/ichiran/JJ012FC001/?bs=011&fw=' + q + '&ar=030&ta=13';
}

/* ============================================================
   他社件数（Netlify Function + Supabase キャッシュ）
============================================================ */
function otherCountCacheKey(buildingName, price) {
  return buildingName + '|' + Math.round(Number(price));
}

function getOtherCountForProp(p) {
  if (!p || !p.n || !p.p) return null;
  const info = otherCountCache.get(otherCountCacheKey(suumoSearchKeyword(p.n), p.p));
  return info ? info.other_count : null;
}

async function loadOtherCounts() {
  try {
    const { data, error } = await sb.from(SB_OTHER_COUNTS).select('building_name, price, other_count, checked_at');
    if (error) throw error;
    otherCountCache = new Map();
    (data || []).forEach(function (row) {
      otherCountCache.set(otherCountCacheKey(row.building_name, row.price), {
        other_count: row.other_count,
        checked_at: row.checked_at,
      });
    });
  } catch (e) {
    console.error('他社件数キャッシュ読込エラー:', e);
  }
}

function collectUniqueBuildingPricePairs() {
  const seen = new Set();
  const pairs = [];
  repoProps.concat(komaProps).forEach(function (p) {
    if (!p.n || !p.p) return;
    const buildingName = suumoSearchKeyword(p.n);
    const price = Math.round(Number(p.p));
    if (!buildingName || !price) return;
    const key = otherCountCacheKey(buildingName, price);
    if (seen.has(key)) return;
    seen.add(key);
    pairs.push({ buildingName: buildingName, price: price, key: key });
  });
  return pairs;
}

function setOtherCountProgress(done, total) {
  const wrap = document.getElementById('other-count-progress');
  const text = document.getElementById('other-count-progress-text');
  const fill = document.getElementById('other-count-progress-fill');
  if (!wrap || !text || !fill) return;
  wrap.style.display = 'block';
  text.textContent = done + ' / ' + total + '件処理中…';
  fill.style.width = (total ? Math.round((done / total) * 100) : 0) + '%';
}

function hideOtherCountProgress() {
  const wrap = document.getElementById('other-count-progress');
  if (wrap) wrap.style.display = 'none';
}

function setOtherCountBusy(busy) {
  otherCountRunning = busy;
  const btn = document.getElementById('other-count-btn');
  if (btn) btn.disabled = busy;
}

async function fetchOtherCompanyCount(buildingName, price) {
  const res = await fetch(OTHER_COUNT_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ buildingName: buildingName, price: price }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '他社件数取得に失敗しました');
  return data;
}

async function upsertOtherCountResult(data) {
  const row = {
    building_name: data.buildingName,
    price: data.price,
    other_count: data.otherCount,
    checked_at: data.checkedAt,
  };
  const { error } = await sb.from(SB_OTHER_COUNTS).upsert(row, { onConflict: 'building_name,price' });
  if (error) throw error;
  otherCountCache.set(otherCountCacheKey(data.buildingName, data.price), {
    other_count: data.otherCount,
    checked_at: data.checkedAt,
  });
}

async function triggerOtherCountUpdate() {
  if (otherCountRunning) return;
  if (!repoProps.length && !komaProps.length) {
    showToast('物件データがありません', 4000);
    return;
  }

  const allPairs = collectUniqueBuildingPricePairs();
  if (!allPairs.length) {
    showToast('更新対象がありません', 4000);
    return;
  }
  const todo = allPairs;

  setOtherCountBusy(true);
  let success = 0;
  let errors = 0;
  const errorLog = [];
  const total = todo.length;
  setOtherCountProgress(0, total);
  showToast('他社件数の取得を開始…', 2000);

  let index = 0;
  let done = 0;
  async function worker() {
    while (index < todo.length) {
      const i = index++;
      const item = todo[i];
      try {
        const data = await fetchOtherCompanyCount(item.buildingName, item.price);
        await upsertOtherCountResult(data);
        success += 1;
      } catch (e) {
        errors += 1;
        errorLog.push({
          buildingName: item.buildingName,
          price: item.price,
          message: e.message || String(e),
        });
        console.error('他社件数エラー:', item, e);
      }
      done += 1;
      setOtherCountProgress(done, total);
      await new Promise(function (r) { setTimeout(r, 300); });
    }
  }

  try {
    const workers = [];
    for (let w = 0; w < OTHER_COUNT_CONCURRENCY; w++) workers.push(worker());
    await Promise.all(workers);
    renderCards();
    reportOtherCountResult(success, errors, errorLog, total);
  } catch (e) {
    showToast('他社件数更新エラー: ' + e.message, 8000);
  } finally {
    setOtherCountBusy(false);
    hideOtherCountProgress();
  }
}

function reportOtherCountResult(success, errors, errorLog, total) {
  if (errors === 0) {
    showToast('他社件数を更新しました（' + success + '件）', 5000);
    return;
  }

  showToast(
    '更新完了：成功 ' + success + '件 / エラー ' + errors + '件ありました',
    8000
  );

  const summary = document.getElementById('other-count-result-summary');
  const listEl = document.getElementById('other-count-error-list');
  if (!summary || !listEl) return;

  summary.innerHTML =
    '<strong>処理 ' + total + '件中、成功 ' + success + '件、エラー ' + errors + '件</strong>' +
    '<br><span style="color:#666">以下の物件は取得に失敗しました。</span>';

  listEl.style.display = 'block';
  listEl.innerHTML = errorLog.map(function (err) {
    return '<div style="padding:6px 0;border-bottom:1px solid #eee">' +
      esc(err.buildingName) + '（' + err.price + '万）<br>' +
      '<span style="color:#cc0000;font-weight:700">' + esc(err.message) + '</span></div>';
  }).join('');

  document.getElementById('other-count-result-overlay').classList.add('open');
}

function closeOtherCountResultModal() {
  document.getElementById('other-count-result-overlay').classList.remove('open');
}

/* ============================================================
   カード移動ロジック（クリック・D&D共通）
============================================================ */
function moveCardLogic(n, currentPane) {
  if (currentPane === 'repo') {
    if (movedToRepo.has(n)) movedToRepo.delete(n);
    else if (movedToKoma.has(n)) movedToKoma.delete(n);
    else movedToKoma.add(n);
  } else {
    if (movedToKoma.has(n)) movedToKoma.delete(n);
    else if (movedToRepo.has(n)) movedToRepo.delete(n);
    else movedToRepo.add(n);
  }
  renderCards();
}

// 後方互換（onclick属性から呼ばれる場合）
function moveCard(name, pane) {
  const n = name.replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  moveCardLogic(n, pane);
}

/* ============================================================
   テキスト出力
============================================================ */
function openTextModal(pane) {
  const areas = getSharedArea();
  let props, title;
  if (pane === 'repo') {
    props = sortProps([
      ...repoProps.filter(p => !movedToKoma.has(p.n)),
      ...komaProps.filter(p => movedToRepo.has(p.n)),
    ].filter(p => areas.size === 0 || areas.has(p._area)));
    title = 'レポ テキスト出力';
  } else {
    props = sortProps([
      ...komaProps.filter(p => !movedToRepo.has(p.n)),
      ...repoProps.filter(p => movedToKoma.has(p.n)),
    ].filter(p => areas.size === 0 || areas.has(p._area)));
    title = 'コマ テキスト出力';
  }
  const lines = props.map(p => p.n);
  document.getElementById('text-modal-title').textContent = title + '（' + props.length + '件）';
  document.getElementById('text-output-area').value = lines.join('\n');
  document.querySelectorAll('input[name="mail-area"]').forEach(r => { r.checked = false; });
  document.getElementById('text-modal-overlay').classList.add('open');
}
function closeTextModal() { document.getElementById('text-modal-overlay').classList.remove('open'); }

function getRemovalProps() {
  const areas = getSharedArea();
  return sortProps(
    repoProps.filter(p => movedToKoma.has(p.n))

  );
}

const MAIL_ALL = 'all@tokyoms.co.jp';

function sendRemovalMail() {
  const area = getMailArea('removal-mail-area');
  if (!area) {
    showToast('送信エリア（城東・城西・城南）を選択してください', 3500);
    return;
  }

  const ta = document.getElementById('removal-output-area');
  if (!ta.value.trim()) {
    showToast('外し出力は0件です', 3500);
    return;
  }

  const to = encodeURIComponent(MAIL_ALL);
  const subject = encodeURIComponent(area + ' 外し物件リスト');

  navigator.clipboard.writeText(ta.value).catch(() => {
    ta.select();
    document.execCommand('copy');
  });

  window.open(
    `https://mail.google.com/mail/?view=cm&to=${to}&su=${subject}`,
    '_blank'
  );

  showToast('📋 外し出力をコピーしました！Gmailに貼り付けて送信してください', 4000);
}

  const el = document.querySelector('input[name="' + radioName + '"]:checked');

/* ============================================================
   Drive同期（Apps Script Webアプリ）
============================================================ */
function setGasSyncBusy(busy) {
  gasSyncRunning = busy;
  document.querySelectorAll('.gas-sync-btn').forEach(function (btn) { btn.disabled = busy; });
}

async function triggerGasSync() {
  if (gasSyncRunning) return;
  if (!GAS_WEB_APP_URL) {
    showToast('GAS_WEB_APP_URL が未設定です', 6000);
    return;
  }

  setGasSyncBusy(true);
  showToast('Drive同期を開始…', 2000);
  try {
    var url = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.indexOf('?') >= 0 ? '&' : '?');
    if (GAS_WEBAPP_TOKEN) url += 'token=' + encodeURIComponent(GAS_WEBAPP_TOKEN) + '&';
    url += 't=' + Date.now();

    const res = await fetch(url);
    const data = JSON.parse(await res.text());
    if (!data.ok) throw new Error(data.error || '同期に失敗しました');

    const had = await loadFromStorage();
    if (had) {
      buildAreaSelects();
      renderCards();
    }
    showToast(data.message || 'Drive同期完了', 5000);
  } catch (e) {
    showToast('同期エラー: ' + e.message, 6000);
    console.error(e);
  } finally {
    setGasSyncBusy(false);
  }
}

/* ============================================================
   ユーティリティ
============================================================ */
function showToast(msg, duration=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, duration);
}
