<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>レポ選ぶぞう</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP','Hiragino Sans',sans-serif;
  font-weight:700;
  background:#fff;
  color:#111;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ヘッダー */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  background:#fff;
  border-bottom:3px solid #111;
  flex-shrink:0;
}
.logo{font-size:22px;font-weight:900;letter-spacing:.05em;color:#111}
.header-left{display:flex;align-items:center;gap:18px;flex-wrap:wrap;min-width:0}
.header-meta{display:flex;flex-direction:column;gap:2px;font-weight:700;line-height:1.4}
#import-time-label{font-size:13px;color:#333}
#import-freq-label{font-size:11px;color:#888}
.hdr-btns{display:flex;gap:10px;align-items:center;flex-shrink:0}
.import-btn{
  padding:8px 18px;
  background:#111;color:#fff;
  border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:14px;
  letter-spacing:.04em;
}
.import-btn:hover{background:#333}
.drive-hdr-btn{background:#1a56a0}
.drive-hdr-btn:hover{background:#134080}

/* メインレイアウト */
.main-layout{
  display:grid;
  grid-template-columns:1fr 4px 1fr;
  height:calc(100vh - 57px);
  /* バナー表示時は自動で縮む */
  min-height:0;
  flex:1;
}
.divider{background:#111}

/* 各ペイン */
.pane{display:flex;flex-direction:column;overflow:hidden}

.pane-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  border-bottom:2px solid #111;
  flex-shrink:0;
}
.pane-title{font-size:18px;font-weight:900}
.pane-title-bar{display:flex;gap:8px;align-items:center}
.pane-count{font-size:13px;color:#555;font-weight:700}

/* 掲載枠バッジ */
.quota-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:13px;font-weight:900;
  padding:3px 6px;color:#333;
}
.quota-badge .quota-current{font-size:32px;font-weight:900;line-height:1}
.quota-badge .quota-limit{font-size:20px;color:#666}
.quota-badge .quota-diff{font-size:20px;font-weight:900;margin-left:2px}
.quota-diff.over{color:#cc0000}
.quota-diff.under{color:#0055cc}
.quota-diff.ok{color:#007700}

.pane-left .pane-header{background:#FFD700}
.pane-right .pane-header{background:#40C0F0}

.text-output-btn{
  padding:6px 14px;
  background:#111;color:#fff;
  border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:13px;
}
.text-output-btn:hover{background:#333}
.pane-header-btns{display:flex;gap:6px;flex-shrink:0}
.removal-output-btn{
  padding:6px 14px;
  background:#fff;color:#cc0000;
  border:2px solid #cc0000;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:13px;
}
.removal-output-btn:hover{background:#fff0f0}

/* 共通ツールバー */
.shared-toolbar{
  padding:8px 16px;
  border-bottom:3px solid #111;
  background:#f5f5f5;
  flex-shrink:0;
  display:flex;gap:16px;align-items:center;flex-wrap:wrap;
}
.toolbar-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tb-label{font-size:13px;font-weight:900;white-space:nowrap;color:#444}
.area-select{
  padding:5px 10px;border:2px solid #111;
  background:#fff;font-family:inherit;font-weight:700;font-size:14px;
  outline:none;cursor:pointer;flex:1;min-width:80px;
}

/* ソートボタン */
.sort-btn{
  padding:5px 12px;
  border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:3px;
}
.sort-btn.active{background:#111;color:#fff}
.sort-btn:hover:not(.active){background:#eee}
.sort-dir{font-size:11px}

/* テンプレ */
.tmpl-select{
  padding:5px 10px;border:2px solid #111;
  background:#fff;font-family:inherit;font-weight:700;font-size:13px;
  outline:none;cursor:pointer;
}
.tmpl-input{
  padding:5px 10px;border:2px solid #111;
  font-family:inherit;font-weight:700;font-size:13px;
  outline:none;width:120px;
}
.tmpl-btn{
  padding:5px 12px;
  border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
}
.tmpl-btn:hover{background:#eee}
.tmpl-btn.save{background:#FFD700;border-color:#cc9900}
.tmpl-btn.save:hover{background:#e6c000}
.tmpl-btn.del{color:#cc0000;border-color:#cc0000}
.tmpl-btn.del:hover{background:#fff0f0}

/* カードリスト */
.card-list{
  flex:1;overflow-y:auto;
  padding:10px;
  display:flex;flex-direction:column;gap:6px;
}
.card-list::-webkit-scrollbar{width:4px}
.card-list::-webkit-scrollbar-thumb{background:#ccc}

/* 物件カード */
.prop-card{
  display:flex;align-items:center;
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  user-select:none;
  background:#fff;
  transition:transform .1s, box-shadow .1s;
  gap:6px;
}
.prop-card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
.prop-card:active{transform:translateY(0)}
/* 元種別で枠色（ペイン関係なく固定） */
.prop-card.prop-repo{border:3px solid #cc0000}
.prop-card.prop-koma{border:3px solid #0090cc}

.card-inner{flex:1;min-width:0}
.card-name{
  font-size:18px;font-weight:900;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:#111;margin-bottom:6px;
}
.card-name-link{
  color:#0055cc;
  text-decoration:none;
}
.card-name-link:hover{text-decoration:underline}
.card-meta{
  display:flex;gap:14px;flex-wrap:wrap;
  font-size:16px;font-weight:700;color:#333;
}
.card-meta span{white-space:nowrap}
.card-copy-btn{
  flex-shrink:0;
  padding:4px 7px;
  border:2px solid #111;
  background:#fff;
  cursor:pointer;
  font-family:inherit;
  font-weight:700;
  font-size:13px;
  border-radius:4px;
  color:#333;
  line-height:1;
}
.card-copy-btn:hover{background:#eee}
.card-copy-btn.copied{background:#FFD700;border-color:#cc9900}
.card-arrow{font-size:14px;font-weight:700;color:#ccc;flex-shrink:0;}

.empty-state{
  display:flex;align-items:center;justify-content:center;
  flex:1;font-size:14px;color:#aaa;font-weight:700;
}

/* ドラッグ＆ドロップ */
.prop-card[draggable="true"]{cursor:grab}
.prop-card[draggable="true"]:active{cursor:grabbing}
.prop-card.dragging{opacity:.35;transform:scale(.97)}
.card-list.drag-over{
  background:rgba(0,0,0,.06);
  outline:3px dashed #111;
  outline-offset:-4px;
}
.drop-placeholder{
  height:52px;border-radius:8px;border:3px dashed #999;
  background:rgba(0,0,0,.04);flex-shrink:0;
}

/* テキスト出力モーダル */
.text-modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:1000;
  align-items:center;justify-content:center;
}
.text-modal-overlay.open{display:flex}
.text-modal{
  background:#fff;border:3px solid #111;
  width:520px;max-width:95vw;max-height:80vh;
  display:flex;flex-direction:column;
}
.text-modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:2px solid #111;flex-shrink:0;
}
.text-modal-title{font-size:16px;font-weight:900}
.text-modal-close{background:none;border:none;font-size:24px;cursor:pointer;font-weight:900;line-height:1}
.text-modal-body{flex:1;overflow-y:auto;padding:14px 16px}
.text-output-area{
  width:100%;min-height:200px;
  border:2px solid #111;padding:10px;
  font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:13px;
  line-height:1.8;resize:vertical;outline:none;
}
.text-copy-btn{
  display:block;width:100%;margin-top:10px;padding:10px;
  background:#111;color:#fff;border:none;cursor:pointer;
  font-family:inherit;font-weight:700;font-size:14px;
}
.text-copy-btn:hover{background:#333}

.mail-area-row{
  margin-top:10px;padding:10px 12px;
  border:2px solid #111;background:#f5f5f5;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.mail-area-label{font-size:13px;font-weight:900;white-space:nowrap}
.mail-area-options{display:flex;gap:14px;flex-wrap:wrap}
.mail-area-option{
  display:flex;align-items:center;gap:5px;
  font-size:14px;font-weight:700;cursor:pointer;
}
.mail-area-option input{
  width:16px;height:16px;accent-color:#111;cursor:pointer;
}

/* エリア複数選択ドロップダウン */
.area-multi-wrap{position:relative;display:inline-block}
.area-multi-btn{
  padding:5px 12px;border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:14px;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  min-width:120px;white-space:nowrap;
}
.area-multi-btn:hover{background:#eee}
.area-dropdown{
  display:none;position:absolute;top:100%;left:0;
  min-width:180px;background:#fff;border:2px solid #111;
  z-index:500;max-height:300px;overflow-y:auto;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.area-dropdown.open{display:block}
.area-dd-ctrl-row{
  display:flex;gap:4px;padding:6px 8px;
  border-bottom:2px solid #111;background:#f5f5f5;
}
.area-dd-ctrl{
  padding:3px 10px;border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;
}
.area-dd-ctrl:hover{background:#eee}
.area-dd-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;cursor:pointer;border-bottom:1px solid #eee;
}
.area-dd-item:hover{background:#f5f5f5}
.area-dd-item input[type=checkbox]{
  width:15px;height:15px;cursor:pointer;accent-color:#111;flex-shrink:0;
}
.area-dd-item label{
  font-size:14px;font-weight:700;cursor:pointer;flex:1;
}
/* 途中保存バッジ */
.draft-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 8px 4px 12px;
  border:2px solid #111;background:#fff;
  font-family:inherit;font-weight:700;font-size:13px;
  cursor:pointer;white-space:nowrap;
}
.draft-badge:hover{background:#f0f0f0}
.draft-badge.active{background:#111;color:#fff}
.draft-del{
  background:none;border:none;font-size:16px;font-weight:900;
  cursor:pointer;line-height:1;padding:0;color:#cc0000;
}
.draft-badge.active .draft-del{color:#ff9999}

#toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:10px 20px;font-size:14px;font-weight:700;
  z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;
}

/* ============================================================
   レスポンシブ（スマホ 680px以下）
============================================================ */
@media (max-width:680px){
  .header{padding:8px 12px;flex-wrap:wrap;gap:8px}
  .header-left{flex-direction:column;align-items:flex-start;gap:4px}
  .logo{font-size:17px}
  #import-time-label{font-size:12px}
  #import-freq-label{font-size:10px}
  .import-btn{padding:6px 12px;font-size:13px}

  /* ツールバー横スクロール */
  .shared-toolbar{padding:6px 8px;gap:4px}
  .toolbar-row{flex-wrap:nowrap;overflow-x:auto;gap:4px}
  .toolbar-row::-webkit-scrollbar{height:0}
  .tb-label{font-size:12px;flex-shrink:0}
  .area-multi-btn{font-size:13px;min-width:90px;padding:4px 8px}
  .tmpl-select{font-size:12px;padding:3px 6px;max-width:100px}
  .tmpl-input{font-size:12px;width:80px;padding:3px 6px}
  .tmpl-btn{font-size:12px;padding:4px 8px;flex-shrink:0}
  .sort-btn{font-size:12px;padding:4px 8px;flex-shrink:0}
  .draft-badge{font-size:12px;padding:3px 8px 3px 10px;flex-shrink:0}

  /* 左右→上下2段レイアウト */
  .main-layout{
    grid-template-columns:1fr;
    grid-template-rows:1fr 4px 1fr;
    height:auto;flex:1;
  }
  .divider{height:4px;width:100%}

  /* 各ペイン固定高 */
  .pane{height:44vh;min-height:0}

  /* ペインヘッダー */
  .pane-header{padding:8px 10px}
  .pane-title{font-size:15px}
  .text-output-btn{font-size:12px;padding:5px 10px}
  .removal-output-btn{font-size:12px;padding:5px 10px}

  /* バッジ数字 */
  .quota-badge .quota-current{font-size:22px}
  .quota-badge .quota-limit{font-size:13px}
  .quota-badge .quota-diff{font-size:13px}

  /* カード */
  .prop-card{padding:8px 10px;gap:4px}
  .card-name{font-size:15px;margin-bottom:3px}
  .card-meta{font-size:13px;gap:8px}
  .card-copy-btn{font-size:11px;padding:3px 5px}
  .card-arrow{font-size:13px}

  /* モーダル */
  .text-modal{width:96vw;max-height:85vh}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">レポ選ぶぞう</div>
    <div class="header-meta">
      <span id="import-time-label">取込：—</span>
      <span id="import-freq-label">自動更新：約15分ごと</span>
    </div>
  </div>
  <div class="hdr-btns">
    <button class="import-btn drive-hdr-btn gas-sync-btn" onclick="triggerGasSync()">🔄 Drive今すぐ同期</button>
  </div>
</div>

<!-- 共通ツールバー -->
<div class="shared-toolbar">
  <div class="toolbar-row">
    <span class="tb-label">エリア：</span>
    <div class="area-multi-wrap" id="area-multi-wrap">
      <button class="area-multi-btn" id="area-multi-btn" onclick="toggleAreaDropdown()">
        <span id="area-multi-label">全エリア</span>
        <span style="font-size:11px;margin-left:6px">▼</span>
      </button>
      <div class="area-dropdown" id="area-dropdown">
        <div class="area-dd-ctrl-row">
          <button class="area-dd-ctrl" onclick="areaSelectAll()">全選択</button>
          <button class="area-dd-ctrl" onclick="areaSelectNone()">全解除</button>
        </div>
        <div id="area-dd-list"></div>
      </div>
    </div>
    <span class="tb-label" style="margin-left:8px">テンプレ：</span>
    <select class="tmpl-select" id="shared-tmpl-select" onchange="loadTemplate()">
      <option value="">選択…</option>
    </select>
    <input class="tmpl-input" id="shared-tmpl-name" placeholder="テンプレート名">
    <button class="tmpl-btn save" onclick="saveTemplate()">保存</button>
    <button class="tmpl-btn del"  onclick="deleteTemplate()">削除</button>
  </div>
  <div class="toolbar-row">
    <span class="tb-label">途中保存：</span>
    <input class="tmpl-input" id="draft-name-input" placeholder="保存名（例：港区チーム）">
    <button class="tmpl-btn save" onclick="saveDraft()">💾 保存</button>
    <div id="draft-list" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
  </div>
  <div class="toolbar-row">
    <span class="tb-label">ソート：</span>
    <button class="sort-btn" id="sort-pv"   onclick="setSort('pv')">PV <span class="sort-dir" id="dir-pv">↓</span></button>
    <button class="sort-btn" id="sort-r"    onclick="setSort('r')">反響 <span class="sort-dir" id="dir-r">↓</span></button>
    <button class="sort-btn" id="sort-p"    onclick="setSort('p')">価格 <span class="sort-dir" id="dir-p">↓</span></button>
    <button class="sort-btn" id="sort-s"    onclick="setSort('s')">面積 <span class="sort-dir" id="dir-s">↓</span></button>
    <button class="sort-btn" id="sort-area" onclick="setSort('area')">エリア <span class="sort-dir" id="dir-area">↑</span></button>
  </div>
</div>

<div class="main-layout">

  <!-- 左：レポ -->
  <div class="pane pane-left">
    <div class="pane-header">
      <div class="pane-title-bar">
        <span class="pane-title">レポ</span>
        <span class="quota-badge" id="repo-quota-badge">
          <span class="quota-current" id="repo-count">0</span>
          <span class="quota-limit" id="repo-limit">/ —件</span>
          <span class="quota-diff" id="repo-diff"></span>
        </span>
      </div>
      <div class="pane-header-btns">
        <button class="removal-output-btn" onclick="openRemovalModal()">外しリスト</button>
        <button class="text-output-btn" onclick="openTextModal('repo')">テキスト出力</button>
      </div>
    </div>
    <div class="card-list" id="repo-list"></div>
  </div>

  <div class="divider"></div>

  <!-- 右：コマ -->
  <div class="pane pane-right">
    <div class="pane-header">
      <div class="pane-title-bar">
        <span class="pane-title">コマ</span>
        <span class="quota-badge" id="koma-quota-badge">
          <span class="quota-current" id="koma-count">0</span>
          <span class="quota-limit" id="koma-limit">/ —件</span>
          <span class="quota-diff" id="koma-diff"></span>
        </span>
      </div>
      <button class="text-output-btn" onclick="openTextModal('koma')">テキスト出力</button>
    </div>
    <div class="card-list" id="koma-list"></div>
  </div>
</div>

<!-- テキスト出力モーダル -->
<div class="text-modal-overlay" id="text-modal-overlay" onclick="if(event.target===this)closeTextModal()">
  <div class="text-modal">
    <div class="text-modal-header">
      <span class="text-modal-title" id="text-modal-title">テキスト出力</span>
      <button class="text-modal-close" onclick="closeTextModal()">×</button>
    </div>
    <div class="text-modal-body">
      <textarea class="text-output-area" id="text-output-area" readonly></textarea>
      <button class="text-copy-btn" onclick="copyText()">📋 コピー</button>
      <div class="mail-area-row">
        <span class="mail-area-label">送信エリア <span style="color:#cc0000">*</span></span>
        <div class="mail-area-options">
          <label class="mail-area-option"><input type="radio" name="mail-area" value="城東">城東</label>
          <label class="mail-area-option"><input type="radio" name="mail-area" value="城西">城西</label>
          <label class="mail-area-option"><input type="radio" name="mail-area" value="城南">城南</label>
        </div>
      </div>
      <button class="text-copy-btn" onclick="sendMail()" style="margin-top:6px;background:#1a56a0">📧 メール作成（コピー＆Gmail開く）</button>
    </div>
  </div>
</div>

<!-- 外しリストモーダル -->
<div class="text-modal-overlay" id="removal-modal-overlay" onclick="if(event.target===this)closeRemovalModal()">
  <div class="text-modal">
    <div class="text-modal-header">
      <span class="text-modal-title" id="removal-modal-title">外しリスト</span>
      <button class="text-modal-close" onclick="closeRemovalModal()">×</button>
    </div>
    <div class="text-modal-body">
      <textarea class="text-output-area" id="removal-output-area" readonly></textarea>
      <button class="text-copy-btn" onclick="copyRemovalText()">📋 コピー</button>
      <div class="mail-area-row">
        <span class="mail-area-label">送信エリア <span style="color:#cc0000">*</span></span>
        <div class="mail-area-options">
          <label class="mail-area-option"><input type="radio" name="removal-mail-area" value="城東">城東</label>
          <label class="mail-area-option"><input type="radio" name="removal-mail-area" value="城西">城西</label>
          <label class="mail-area-option"><input type="radio" name="removal-mail-area" value="城南">城南</label>
        </div>
      </div>
      <button class="text-copy-btn" onclick="sendRemovalMail()" style="margin-top:6px;background:#993333">📧 外しリストをメール作成（all@tokyoms.co.jp）</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>

function formatImportTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '—';
  const p = n => String(n).padStart(2, '0');
  return d.getFullYear() + '/' + p(d.getMonth() + 1) + '/' + p(d.getDate())
    + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

function updateImportMetaDisplay(importedAt, importedBy) {

  if (!importedAt) {
    timeEl.textContent = '取込：未取込';
  } else {
    const src = importedBy ? '（' + importedBy + '）' : '';
    timeEl.textContent = '取込：' + formatImportTime(importedAt) + src;
  }
  freqEl.textContent = '自動更新：約' + DRIVE_SYNC_INTERVAL_MIN + '分ごと（Drive → Supabase）';
}

async function loadDrafts() {
  try {
    const raw = localStorage.getItem(DRAFT_KEY);
    drafts = raw ? JSON.parse(raw) : {};
  } catch { drafts = {}; }
  renderDraftList();
}

function saveDraftsToLocal() {
  try { localStorage.setItem(DRAFT_KEY, JSON.stringify(drafts)); } catch {}
}

function renderDraftList() {
  const el = document.getElementById('draft-list');
  if (!el) return;
  el.innerHTML = '';
  Object.keys(drafts).sort().forEach(name => {
    const badge = document.createElement('button');
    badge.className = 'draft-badge' + (name === currentDraftName ? ' active' : '');
    badge.innerHTML = `<span onclick="loadDraft('${esc(name)}')">${name}</span><button class="draft-del" onclick="deleteDraft(event,'${esc(name)}')">×</button>`;
    el.appendChild(badge);

async function saveDraft() {

  if (!name) { input.focus(); return; }

function parseProps(propData, silent) {
  repoProps = [];
  komaProps = [];
  Object.entries(propData).forEach(([area, props]) => {
    props.forEach(p => {
      const item = { ...p, _area: area };
      if (p._type === 'repo') repoProps.push(item);
      else if (p._type === 'koma') komaProps.push(item);
      else {
        // _typeが不明な場合はコマ扱い（旧データ互換）
        item._type = 'koma';
        komaProps.push(item);
      }
    });
  });
  if (!silent) showToast(`読込完了：レポ ${repoProps.length}件 / コマ ${komaProps.length}件`);
  checkSetagayaWarning(propData);
}

    cb.type = 'checkbox';
    cb.id = 'area-cb-' + a;
    cb.value = a;

    cb.addEventListener('change', () => {
      if (cb.checked) selectedAreas.add(a);

}

============================================================ */
function setSort(key) {
  if (sortState.key === key) {
    sortState.dir = sortState.dir === 'desc' ? 'asc' : 'desc';
  } else {
    sortState.key = key;
    sortState.dir = key === 'area' ? 'asc' : 'desc';
  }
  updateSortUI();
  renderCards();
}

function updateSortUI() {
  const keys = ['pv','r','p','s','area'];
  keys.forEach(k => {
    const btn = document.getElementById(`sort-${k}`);
    const dir = document.getElementById(`dir-${k}`);
    if (!btn || !dir) return;
    const isActive = sortState.key === k;
    btn.classList.toggle('active', isActive);
    if (isActive) dir.textContent = sortState.dir === 'desc' ? '↓' : '↑';
    else dir.textContent = k === 'area' ? '↑' : '↓';
  });
}

function sortProps(arr) {
  const { key, dir } = sortState;
  const d = dir === 'desc' ? -1 : 1;
  return [...arr].sort((a, b) => {
    if (key === 'area') return (a._area < b._area ? -1 : a._area > b._area ? 1 : 0) * d;
    return ((b[key] || 0) - (a[key] || 0)) * d;
  });
}

async function loadTemplates() {
  try {
    const { data } = await sb.from(SB_TEMPLATES).select('name,areas');
    if (!data) return;
    templates = { repo: {}, koma: {}, shared: {} };
    data.forEach(row => {
      if (row.name.startsWith('repoApp_shared::')) {
        templates.shared[row.name.slice('repoApp_shared::'.length)] = row.areas;
      } else if (row.name.startsWith('repoApp_repo::')) {
        templates.repo[row.name.slice('repoApp_repo::'.length)] = row.areas;
      } else if (row.name.startsWith('repoApp_koma::')) {
        templates.koma[row.name.slice('repoApp_koma::'.length)] = row.areas;
      }
    });
    buildTmplSelects();
  } catch(e) { console.error('loadTemplates:', e); }
}

function buildTmplSelects() {
  const all = { ...templates.repo, ...templates.koma, ...templates.shared };
  const sel = document.getElementById('shared-tmpl-select');
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択…</option>';
  Object.keys(all).sort().forEach(name => {
    sel.innerHTML += `<option value="${esc(name)}">${name}</option>`;
  });
  sel.value = cur;
}

function loadTemplate() {
  const sel = document.getElementById('shared-tmpl-select');
  const name = sel.value;
  if (!name) return;
  const all = { ...templates.repo, ...templates.koma, ...templates.shared };
  const saved = all[name]; // 配列 or 文字列
  if (saved !== undefined) {
    // 配列ならSet、文字列なら1要素Set、空文字なら全エリア
    const areaArr = Array.isArray(saved) ? saved : (saved ? [saved] : []);
    selectedAreas = new Set(areaArr);
    // チェックボックスを更新
    document.querySelectorAll('#area-dd-list input[type=checkbox]').forEach(cb => {
      cb.checked = selectedAreas.size === 0 || selectedAreas.has(cb.value);
    });
    updateAreaLabel();
    renderCards();
  }
}

async function saveTemplate() {
  const nameInput = document.getElementById('shared-tmpl-name');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }
  // 選択中のエリアを配列で保存（空=全エリア）
  const areaArr = selectedAreas.size === 0 ? [] : [...selectedAreas];
  const dbKey = `repoApp_shared::${name}`;
  const { error } = await sb.from(SB_TEMPLATES).upsert(
    { name: dbKey, areas: areaArr }, { onConflict: 'name' }
  );
  if (error) { showToast('保存失敗: ' + error.message); return; }
  templates.shared[name] = areaArr;
  buildTmplSelects();
  document.getElementById('shared-tmpl-select').value = name;
  nameInput.value = '';
  const label = areaArr.length === 0 ? '全エリア' : areaArr.join('・');
  showToast(`「${name}」を保存しました（${label}）`);
}

async function deleteTemplate() {
  const sel = document.getElementById('shared-tmpl-select');
  const name = sel.value;
  if (!name) return;
  let dbKey = null;
  if (templates.shared[name] !== undefined) dbKey = `repoApp_shared::${name}`;
  else if (templates.repo[name]  !== undefined) dbKey = `repoApp_repo::${name}`;
  else if (templates.koma[name]  !== undefined) dbKey = `repoApp_koma::${name}`;
  if (dbKey) await sb.from(SB_TEMPLATES).delete().eq('name', dbKey);
  delete templates.shared[name]; delete templates.repo[name]; delete templates.koma[name];
  buildTmplSelects();
  showToast(`「${name}」を削除しました`);
}

function renderCards() {
  const areas = getSharedArea(); // Set（空=全エリア）

  let repoDisplayed = [
    ...repoProps.filter(p => !movedToKoma.has(p.n)),
    ...komaProps.filter(p => movedToRepo.has(p.n)),
  ].filter(p => areas.size === 0 || areas.has(p._area));

  let komaDisplayed = [
    ...komaProps.filter(p => !movedToRepo.has(p.n)),
    ...repoProps.filter(p => movedToKoma.has(p.n)),
  ].filter(p => areas.size === 0 || areas.has(p._area));

  repoDisplayed = sortProps(repoDisplayed);
  komaDisplayed = sortProps(komaDisplayed);

  updateQuotaBadge('repo', repoDisplayed.length, areas);
  updateQuotaBadge('koma', komaDisplayed.length, areas);

  renderList('repo-list', repoDisplayed, 'repo');
  renderList('koma-list', komaDisplayed, 'koma');
}

/* 掲載枠バッジ更新 */
function updateQuotaBadge(pane, current, areas) {
  document.getElementById(`${pane}-count`).textContent = current + '件';

  const limitEl = document.getElementById(`${pane}-limit`);
  const diffEl  = document.getElementById(`${pane}-diff`);
  const badge   = document.getElementById(`${pane}-quota-badge`);

  // 単一エリア選択時のみ枠数表示
  const singleArea = areas.size === 1 ? [...areas][0] : null;

  // 世田谷区（数字なし）エラー
  if (singleArea && isSetagayaError(singleArea)) {
    limitEl.textContent = '';
    diffEl.textContent  = '⚠ 世田谷区1 or 2 が必要です';
    diffEl.className    = 'quota-diff over';
    return;
  }

  let limit;
  if (areas.size === 0) {
    limit = QUOTA_TOTAL[pane];
  } else if (singleArea) {
    limit = QUOTA[singleArea] ? QUOTA[singleArea][pane] : null;
  } else {
    let sum = 0;
    [...areas].forEach(a => {
      if (QUOTA[a]) sum += QUOTA[a][pane];
    });
    limit = sum > 0 ? sum : null;
  }

  if (limit == null) {
    limitEl.textContent = '';
    diffEl.textContent  = '枠未設定';
    diffEl.className    = 'quota-diff over';
    return;
  }

  limitEl.textContent = '/ ' + limit + '件';
  const diff = current - limit;

  if (diff > 0) {
    diffEl.textContent = '+' + diff;
    diffEl.className   = 'quota-diff over';
  } else if (diff < 0) {
    diffEl.textContent = String(diff);
    diffEl.className   = 'quota-diff under';
  } else {
    diffEl.textContent = '✓';
    diffEl.className   = 'quota-diff ok';
  }
}

function renderList(containerId, props, pane) {

  if (props.length === 0) {
    el.innerHTML = '<div class="empty-state">物件がありません</div>';

    props.forEach(p => {
      const isMoved = (pane === 'repo' && movedToRepo.has(p.n)) ||
                      (pane === 'koma' && movedToKoma.has(p.n));
      const arrow = pane === 'repo' ? '→' : '←';
      const price = p.p ? p.p.toLocaleString() + '万' : '—';
      const areaStr = p.s ? p.s + '㎡' : '—';
      const pv  = p.pv !== undefined ? `<span style="color:#cc0000">PV ${p.pv}</span>` : '';
      const rep = p.r ? '反響 ' + p.r + '件' : '';

      const card = document.createElement('div');
      // 元の種別（_type）で枠色を決定（移動しても色は変わらない）
      const origType = p._type === 'repo' ? 'repo' : 'koma';
      card.className = 'prop-card prop-' + origType;
      card.draggable = true;
      card.dataset.name = p.n;
      card.dataset.pane = pane;
      const suumoKw = suumoSearchKeyword(p.n);
      card.innerHTML = `
        <div class="card-inner">
          <a class="card-name card-name-link" href="${suumoSearchUrl(p.n)}" target="_blank" rel="noopener noreferrer" title="SUUMOで「${esc(suumoKw)}」を検索">${p.n}</a>
          <div class="card-meta">
            ${pv ? `<span>${pv}</span>` : ''}
            <span>${price}</span>
            <span>${areaStr}</span>
            ${rep ? `<span>${rep}</span>` : ''}
            <span style="color:#666">${p._area}</span>
          </div>
        </div>
        <button class="card-copy-btn" type="button" title="物件名をコピー">📋</button>
        <div class="card-arrow">${arrow}</div>`;

      // クリックで移動
      card.addEventListener('click', () => moveCardLogic(p.n, pane));

      // ドラッグ開始
      card.addEventListener('dragstart', e => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', JSON.stringify({ name: p.n, fromPane: pane }));
        setTimeout(() => card.classList.add('dragging'), 0);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.card-list').forEach(l => l.classList.remove('drag-over'));
        document.querySelectorAll('.drop-placeholder').forEach(ph => ph.remove());
      });

      // 子要素のpointer-eventsをなくしてドラッグを親カードに集約
      card.querySelectorAll('*').forEach(child => {
        child.style.pointerEvents = 'none';
      });

      const copyBtn = card.querySelector('.card-copy-btn');
      copyBtn.style.pointerEvents = 'auto';
      copyBtn.addEventListener('click', e => {
        e.stopPropagation();
        copyPropName(p.n, copyBtn);
      });
      copyBtn.addEventListener('mousedown', e => e.stopPropagation());
      copyBtn.addEventListener('dragstart', e => e.preventDefault());

      const nameLink = card.querySelector('.card-name-link');
      nameLink.style.pointerEvents = 'auto';
      nameLink.addEventListener('click', e => {
        e.stopPropagation();
        e.preventDefault();
        window.open(suumoSearchUrl(p.n), '_blank', 'noopener,noreferrer');
      });
      nameLink.addEventListener('mousedown', e => e.stopPropagation());
      nameLink.addEventListener('dragstart', e => e.preventDefault());

      el.appendChild(card);
    });
  }

  // ドロップゾーン：_ddSetupフラグで重複登録を防ぐ
  if (!el._ddSetup) {
    el._ddSetup = true;
    el.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.classList.add('drag-over');
      if (!el.querySelector('.drop-placeholder')) {
        const ph = document.createElement('div');
        ph.className = 'drop-placeholder';
        el.appendChild(ph);
      }
    });
    el.addEventListener('dragleave', e => {
      if (!el.contains(e.relatedTarget)) {
        el.classList.remove('drag-over');
        el.querySelectorAll('.drop-placeholder').forEach(ph => ph.remove());
      }
    });
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      el.querySelectorAll('.drop-placeholder').forEach(ph => ph.remove());
      try {
        const { name, fromPane } = JSON.parse(e.dataTransfer.getData('text/plain'));
        if (fromPane === pane) return;
        moveCardLogic(name, fromPane);
      } catch {}
    });
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function suumoSearchKeyword(name) {
  return (name || '').trim()
    .replace(/\s*[\d\-]+号(?:室)?$/u, '')
    .replace(/\s+[A-Za-z]?[\d\-]+$/u, '')
    .trim();
}

function suumoSearchUrl(name) {
  const q = encodeURIComponent(suumoSearchKeyword(name));
  // 検索パネルの入力欄は name="fw2" だが、検索結果URLは fw= になる
  return 'https://suumo.jp/jj/bukken/ichiran/JJ012FC001/?bs=011&fw=' + q + '&ar=030&ta=13';
}

/* ============================================================
   カード移動ロジック（クリック・D&D共通）
============================================================ */
function moveCardLogic(n, currentPane) {
  if (currentPane === 'repo') {
    if (movedToRepo.has(n)) movedToRepo.delete(n);
    else if (movedToKoma.has(n)) movedToKoma.delete(n);
    else movedToKoma.add(n);
  } else {
    if (movedToKoma.has(n)) movedToKoma.delete(n);
    else if (movedToRepo.has(n)) movedToRepo.delete(n);
    else movedToRepo.add(n);
  }
  renderCards();
}

// 後方互換（onclick属性から呼ばれる場合）
function moveCard(name, pane) {
  const n = name.replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&lt;/g,'<').replace(/&gt;/g,'>');
  moveCardLogic(n, pane);
}

/* ============================================================
   テキスト出力
============================================================ */
function openTextModal(pane) {
  const areas = getSharedArea();
  let props, title;
  if (pane === 'repo') {
    props = sortProps([
      ...repoProps.filter(p => !movedToKoma.has(p.n)),
      ...komaProps.filter(p => movedToRepo.has(p.n)),
    ].filter(p => areas.size === 0 || areas.has(p._area)));
    title = 'レポ テキスト出力';
  } else {
    props = sortProps([
      ...komaProps.filter(p => !movedToRepo.has(p.n)),
      ...repoProps.filter(p => movedToKoma.has(p.n)),
    ].filter(p => areas.size === 0 || areas.has(p._area)));
    title = 'コマ テキスト出力';
  }
  const lines = props.map(p => p.n);
  document.getElementById('text-modal-title').textContent = title + '（' + props.length + '件）';
  document.getElementById('text-output-area').value = lines.join('\n');
  document.querySelectorAll('input[name="mail-area"]').forEach(r => { r.checked = false; });
  document.getElementById('text-modal-overlay').classList.add('open');
}
function closeTextModal() { document.getElementById('text-modal-overlay').classList.remove('open'); }

function getRemovalProps() {
  const areas = getSharedArea();
  return sortProps(
    repoProps.filter(p => movedToKoma.has(p.n))
      .filter(p => areas.size === 0 || areas.has(p._area))
  );
}

function openRemovalModal() {
  const props = getRemovalProps();
  document.getElementById('removal-modal-title').textContent = '外しリスト（' + props.length + '件）';
  document.getElementById('removal-output-area').value = props.map(p => p.n).join('\n');
  document.querySelectorAll('input[name="removal-mail-area"]').forEach(r => { r.checked = false; });
  document.getElementById('removal-modal-overlay').classList.add('open');
}

function closeRemovalModal() { document.getElementById('removal-modal-overlay').classList.remove('open'); }

function copyRemovalText() {
  const ta = document.getElementById('removal-output-area');
  ta.select();
  document.execCommand('copy');
  showToast('外しリストをコピーしました');
}

const MAIL_ALL = 'all@tokyoms.co.jp';

function sendRemovalMail() {
  const area = getMailArea('removal-mail-area');
  if (!area) {
    showToast('送信エリア（城東・城西・城南）を選択してください', 3500);
    return;
  }

  const ta = document.getElementById('removal-output-area');
  if (!ta.value.trim()) {
    showToast('外しリストは0件です', 3500);
    return;
  }

  const to = encodeURIComponent(MAIL_ALL);
  const subject = encodeURIComponent(area + ' 外し物件リスト');

  navigator.clipboard.writeText(ta.value).catch(() => {
    ta.select();
    document.execCommand('copy');
  });

  window.open(
    `https://mail.google.com/mail/?view=cm&to=${to}&su=${subject}`,
    '_blank'
  );

  showToast('📋 外しリストをコピーしました！Gmailに貼り付けて送信してください', 4000);
}

function getMailArea(radioName) {
  const el = document.querySelector('input[name="' + radioName + '"]:checked');
  return el ? el.value : null;
}

const MAIL_TO = {
  '城東': 'tokyomsco1@gmail.com',
  '城西': 'tokyomsco2@gmail.com',
  '城南': 'tokyomsco3@gmail.com',
};

function sendMail() {
  const area = getMailArea('mail-area');
  if (!area) {
    showToast('送信エリア（城東・城西・城南）を選択してください', 3500);
    return;
  }

  const ta      = document.getElementById('text-output-area');
  const to      = encodeURIComponent(MAIL_TO[area] + ',' + MAIL_ALL);
  const subject = encodeURIComponent('物件リスト(' + area + ')');

  // ① テキストをクリップボードにコピー
  navigator.clipboard.writeText(ta.value).catch(() => {
    // clipboard APIが使えない場合はselect方式
    ta.select();
    document.execCommand('copy');
  });

  // ② Gmail作成画面を開く（本文は空・宛先と件名だけ自動入力）
  window.open(
    `https://mail.google.com/mail/?view=cm&to=${to}&su=${subject}`,
    '_blank'
  );

  showToast('📋 コピーしました！Gmailに貼り付けて送信してください', 4000);
}

function copyText() {
  const ta = document.getElementById('text-output-area');
  ta.select(); document.execCommand('copy');
  showToast('コピーしました');
}

async function copyPropName(name, btn) {
  try {
    await navigator.clipboard.writeText(name);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = name;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  const label = name.length > 24 ? name.slice(0, 24) + '…' : name;
  showToast('「' + label + '」をコピーしました', 2000);
  if (btn) {
    btn.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.textContent = '📋';
    }, 1200);
  }
}

/* ============================================================
   Drive同期（Apps Script Webアプリ）
============================================================ */
function setGasSyncBusy(busy) {
  gasSyncRunning = busy;
  document.querySelectorAll('.gas-sync-btn').forEach(function (btn) { btn.disabled = busy; });
}

async function triggerGasSync() {
  if (gasSyncRunning) return;
  if (!GAS_WEB_APP_URL) {
    showToast('GAS_WEB_APP_URL が未設定です', 6000);
    return;
  }

  setGasSyncBusy(true);
  showToast('Drive同期を開始…', 2000);
  try {
    var url = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.indexOf('?') >= 0 ? '&' : '?');
    if (GAS_WEBAPP_TOKEN) url += 'token=' + encodeURIComponent(GAS_WEBAPP_TOKEN) + '&';
    url += 't=' + Date.now();

    const res = await fetch(url);
    const data = JSON.parse(await res.text());
    if (!data.ok) throw new Error(data.error || '同期に失敗しました');

    const had = await loadFromStorage();
    if (had) {
      buildAreaSelects();
      renderCards();
    }
    showToast(data.message || 'Drive同期完了', 5000);
  } catch (e) {
    showToast('同期エラー: ' + e.message, 6000);
    console.error(e);
  } finally {
    setGasSyncBusy(false);
  }
}

/* ============================================================
   ユーティリティ
============================================================ */
function showToast(msg, duration=3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, duration);
}

initApp();
